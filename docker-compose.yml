services:
  mysql:
    image: mysql:8.4
    container_name: flightprestige-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: flightprestige
      MYSQL_USER: flightprestige
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "flightprestige", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: flightprestige-api
    env_file: ./packages/backend/.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: flightprestige
      DB_USER: flightprestige
      DB_PASSWORD: password
    ports:
      - "4000:4000"
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./packages/backend/src:/app/src

volumes:
  mysql_data:
