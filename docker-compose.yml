services:
  postgres:
    image: postgres:16-alpine
    container_name: flightprestige-db
    environment:
      POSTGRES_DB: flightprestige
      POSTGRES_USER: flightprestige
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flightprestige"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flightprestige-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flightprestige-api
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://flightprestige:password@postgres:5432/flightprestige
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src  # dev only — hot reload via tsx watch

volumes:
  postgres_data:
  redis_data:
